<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f9fafb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    display: flex;
    width: 900px;
    height: 550px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Left Side */
.left {
    width: 50%;
    background: linear-gradient(135deg, #4F46E5, #22C55E);
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 28px;
    margin-bottom: 15px;
}

.left p {
    font-size: 14px;
    opacity: 0.9;
}

/* Right Side */
.right {
    width: 50%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Language */
.lang {
    text-align: right;
    font-size: 14px;
    margin-bottom: 20px;
    color: #4F46E5;
}

/* AI Message */
.ai-box {
    background: #eef2ff;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #4F46E5;
    box-shadow: 0 0 5px rgba(79,70,229,0.4);
}

/* Row */
.row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #4F46E5;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #4338CA;
    transform: scale(1.02);
}

/* Google Button */
.google {
    background: white;
    color: black;
    border: 1px solid #ccc;
}

.google:hover {
    background: #f1f1f1;
}

/* Bottom text */
.bottom {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.bottom span {
    color: #22C55E;
    cursor: pointer;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        width: 90%;
        height: auto;
    }

    .left {
        width: 100%;
        height: 200px;
        text-align: center;
    }

    .right {
        width: 100%;
    }
}
    </style>
</head>

<body>

    <div class="container">

        <!-- Left Section -->
        <div class="left">
            <h1>Meri Yojna</h1>
            <h2>Empowering Citizens with Smart Scheme Access</h2>
            <p>Find the right government schemes instantly with AI</p>
        </div>

        <!-- Right Section -->
        <div class="right">

            <div class="lang">English | हिंदी | मराठी</div>

            <div class="ai-box">
                🤖 Hi! I’ll help you find the best schemes after login
            </div>

            <!-- <input type="text" placeholder="Email or Mobile Number">
            <input type="password" placeholder="Password"> -->
            <form action="/login" method="POST">
                <input name="username" placeholder="Username" required>
                <input name="password" type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>



            <!-- <div class="row">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button onclick="loginUser()">Login</button>

            <button class="google">Login with Google</button> -->

            <div class="bottom">
                Don’t have an account? <span>Create Account</span>
            </div>

        </div>

    </div>

    <script>
        function loginUser() {
            // You can add validation later
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
