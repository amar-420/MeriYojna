<!DOCTYPE html>
<html>
<head>
<title>MeriYojna Chatbot</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#1e1e1e;
}

/* Layout */
.container{
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#0F172A;
    color:#E2E8F0;
    padding:10px;
    overflow-y:auto;
    display:none; /* ❌ hidden by default */
}

.new-chat{
    width:100%;
    padding:8px;
    background:#2563EB;
    border:none;
    color:white;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.chat-item{
    padding:8px;
    margin:5px 0;
    background:#222;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    display:flex;
    justify-content:space-between;
}

/* Chatbox */
.chatbox{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#1E293B;
}

/* Header */
.header{
    padding:8px;
    background:#2563EB;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header button{
    margin-right:10px;
    padding:5px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* Messages */
.messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.user,.bot{
    max-width:70%;
    width:fit-content;
    padding:8px 12px;
    margin:6px;
    border-radius:15px;
    font-size:13px;
}

.user{
    background:#6396fc;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
}

/* Input */
.inputbox{
    display:flex;
    padding:5px;
    background:white;
}

input{
    flex:1;
    padding:6px;
    border:none;
    border-radius:15px;
}

button{
    margin-left:5px;
    padding:6px;
    border:none;
    border-radius:50%;
    background:#3B82F6;
    color:white;
    cursor:pointer;
}

/* Selector */
#selectorSection{
    display:none;
    padding:20px;
    color:white;
}

/* Welcome */
#welcomeScreen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
    color:white;
}
</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h3>Recent Chats</h3>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div id="history"></div>
</div>

<!-- Main -->
<div class="chatbox">

<!-- Header -->
<div class="header">
<div id="navButtons" style="display:none;">
    <button onclick="showChatbot()">MeriYojna Chatbot</button>
    <button onclick="showSelector()">MeriYojna Selector</button>
</div>
<button onclick="goHome()">Home</button>

<select id="lang" onchange="changeLanguage()">
<option value="en">EN</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
</select>
</div>

<!-- Welcome -->
<div id="welcomeScreen">
    <h1>🙏 Welcome to MeriYojna</h1>
    <p>Select what you want to use:</p>

    <button onclick="showChatbot()" style="margin:10px; padding:10px 20px; border:none; border-radius:10px; background:#2563EB; color:white;">
       MeriYojna Chatbot
    </button>

    <button onclick="showSelector()" style="margin:10px; padding:10px 20px; border:none; border-radius:10px; background:#16A34A; color:white;">
     MeriYojna Scheme Selector
    </button>
</div>

<!-- Chatbot -->
<div id="chatbotSection" style="display:none; flex-direction:column; height:100%;">
    <div class="messages" id="chat"></div>

    <div class="inputbox">
        <input id="msg" placeholder="Type message...">
        <button onclick="startVoice()">🎙️</button>
        <button onclick="send()">➤</button>
    </div>
</div>

<!-- Selector -->
<div id="selectorSection">
<h2>MeriYojna Scheme Selector</h2>

<input id="age" placeholder="Enter Age"><br><br>
<input id="income" placeholder="Enter Income"><br><br>

<select id="occupation">
<option value="student">Student</option>
<option value="farmer">Farmer</option>
<option value="other">Other</option>
</select><br><br>

<button onclick="checkEligibility()">Check Eligibility</button>

<div id="result" style="margin-top:20px;"></div>
</div>

</div>
</div>

<script>

let selectedLanguage="en";
let backendURL="http://127.0.0.1:10000";
let chat_id=Date.now();

/* Toggle */
function showChatbot(){
    document.getElementById("welcomeScreen").style.display="none";
    document.getElementById("chatbotSection").style.display="flex";
    document.getElementById("selectorSection").style.display="none";

    document.getElementById("navButtons").style.display="block";
    document.getElementById("sidebar").style.display="block"; // ✅ show chats

    loadHistory();
}

function showSelector(){
    document.getElementById("welcomeScreen").style.display="none";
    document.getElementById("chatbotSection").style.display="none";
    document.getElementById("selectorSection").style.display="block";

    document.getElementById("navButtons").style.display="block";
    document.getElementById("sidebar").style.display="none"; // ❌ hide chats
}

function goHome(){
    document.getElementById("welcomeScreen").style.display="flex";
    document.getElementById("chatbotSection").style.display="none";
    document.getElementById("selectorSection").style.display="none";

    document.getElementById("navButtons").style.display="none";
    document.getElementById("sidebar").style.display="none"; // ❌ hide again
}

/* Language */
function changeLanguage(){
    selectedLanguage=document.getElementById("lang").value;
}

/* New Chat */
function newChat(){
    chat_id=Date.now();
    document.getElementById("chat").innerHTML="";
}

/* Send */
function send(){
let msg=document.getElementById("msg").value;
if(!msg) return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="user">${msg}</div>`;
document.getElementById("msg").value="";

chat.innerHTML+=`<div class="bot" id="typing">Typing...</div>`;

fetch(backendURL+"/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    message:msg,
    lang:selectedLanguage,
    chat_id:chat_id
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("typing").remove();

chat.innerHTML+=`<div class="bot">${data.reply.replace(/\n/g,"<br>")}</div>`;

if(data.link){
chat.innerHTML+=`<div class="bot"><a href="${data.link}" target="_blank">Apply Here</a></div>`;
}

chat.scrollTop=chat.scrollHeight;
loadHistory();
});
}

/* Enter */
document.getElementById("msg").addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

/* Voice */
function getVoiceLang(){
if(selectedLanguage==="hi") return "hi-IN";
if(selectedLanguage==="mr") return "mr-IN";
return "en-IN";
}

function startVoice(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang=getVoiceLang();
recognition.start();

recognition.onresult=function(event){
let text=event.results[0][0].transcript;
document.getElementById("msg").value=text;
setTimeout(()=>send(),200);
};
}

/* History */
function loadHistory(){
fetch(backendURL+"/all_chats")
.then(res=>res.json())
.then(data=>{
let history=document.getElementById("history");
history.innerHTML="";

data.forEach(item=>{
history.innerHTML+=`
<div class="chat-item" onclick="openChat('${item[0]}')">
<span>${item[1]}</span>
<span onclick="event.stopPropagation(); deleteChat('${item[0]}')">❌</span>
</div>`;
});
});
}

/* Open Chat */
function openChat(id){
chat_id=id;

fetch(backendURL+"/get_chat/"+id)
.then(res=>res.json())
.then(data=>{
let chat=document.getElementById("chat");
chat.innerHTML="";

data.forEach(item=>{
chat.innerHTML+=`<div class="user">${item[0]}</div>`;
chat.innerHTML+=`<div class="bot">${item[1].replace(/\n/g,"<br>")}</div>`;
});
});
}

/* Delete */
function deleteChat(id){
fetch(backendURL+"/delete_chat/"+id)
.then(()=>loadHistory());
}

/* Selector */
function checkEligibility(){
let age=document.getElementById("age").value;
let income=document.getElementById("income").value;
let occupation=document.getElementById("occupation").value;

let result=document.getElementById("result");

result.innerHTML="Checking...";

fetch(backendURL+"/eligibility",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    age:age,
    income:income,
    occupation:occupation,
    lang:selectedLanguage
})
})
.then(res=>res.json())
.then(data=>{
    result.innerHTML=data.reply;
});
}

</script>

</body>
</html>
